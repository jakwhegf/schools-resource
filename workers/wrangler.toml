# Deploy: cd workers && npx wrangler deploy
# DNS: tạo A/AAAA (proxied) hoặc CNAME cdn → Worker (Custom domain trên worker).

name = "schools-resource-proxy"
main = "src/index.js"
compatibility_date = "2024-08-01"

[vars]
GITHUB_PAGES_HOST = "jakwhegf.github.io"
GITHUB_PAGES_PREFIX = "/schools-resource"
PUBLIC_SITE_URL = "https://cdn.ubgx.me"

# Custom Domain: Cloudflare tự tạo DNS + SSL cho subdomain (zone ubgx.me đã có sẵn).
[[routes]]
pattern = "cdn.ubgx.me"
custom_domain = true

# Bucket R2: ubgx — https://dash.cloudflare.com/.../r2/default/buckets/ubgx
[[r2_buckets]]
binding = "SCHOOLS_R2"
bucket_name = "ubgx"

# Nếu đã gắn Custom Domain R2 trực tiếp lên cdn.ubgx.me, gỡ để tránh trùng với Worker.

# Secrets: wrangler secret put WEBHOOK_SECRET | SYNC_TOKEN | CF_API_TOKEN | CF_ZONE_ID
