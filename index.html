<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schools resource</title>
    <link rel="stylesheet" href="stylist.css?v=2">
</head>
<body>
    <div id="app-container">
        <div id="schools-resource-container"></div>
    </div>

    <div class="bottom-bar">
        <button class="fs-btn" id="fsBtn" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
            <span>Fullscreen</span>
        </button>
    </div>

    <script>
        (function () {
            var fsBtn = document.getElementById("fsBtn");

            function toggleFullscreen() {
                var target = document.getElementById("app-container") || document.body;
                var isFs = document.fullscreenElement || document.mozFullScreenElement || document.webkitFullscreenElement || document.msFullscreenElement;

                if (!isFs) {
                    if (target.requestFullscreen) {
                        target.requestFullscreen();
                    } else if (target.msRequestFullscreen) {
                        target.msRequestFullscreen();
                    } else if (target.mozRequestFullScreen) {
                        target.mozRequestFullScreen();
                    } else if (target.webkitRequestFullscreen) {
                        target.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    } else if (document.mozCancelFullScreen) {
                        document.mozCancelFullScreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                }
            }

            function updateBtnState() {
                var btnSpan = document.querySelector("#fsBtn span");
                var isFs = document.fullscreenElement || document.mozFullScreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
                if (btnSpan) btnSpan.textContent = isFs ? "Exit Fullscreen" : "Fullscreen";
            }

            fsBtn.addEventListener("click", toggleFullscreen);
            document.addEventListener("fullscreenchange", updateBtnState);
            document.addEventListener("webkitfullscreenchange", updateBtnState);
            document.addEventListener("mozfullscreenchange", updateBtnState);
            document.addEventListener("MSFullscreenChange", updateBtnState);
        })();
    </script>

    <script src="main.js?v=13"></script>
</body>
</html>
