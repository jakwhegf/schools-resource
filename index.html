<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schools resource</title>
    <link rel="stylesheet" href="stylist.css?v=2">
</head>
<body>
    <div id="app-container">
        <div id="schools-resource-container"></div>
    </div>

    <div class="bottom-bar">
        <button class="fs-btn" id="fsBtn" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
            <span>Fullscreen</span>
        </button>
    </div>

    <script>
        (function () {
            var fsBtn = document.getElementById("fsBtn");

            fsBtn.addEventListener("click", function () {
                var w = screen.availWidth - 80;
                var h = screen.availHeight - 120;
                var left = Math.round((screen.availWidth - w) / 2);
                var top = Math.round((screen.availHeight - h) / 2);
                var popup = window.open(
                    "about:blank",
                    "_blank",
                    "width=" + w + ",height=" + h + ",left=" + left + ",top=" + top +
                    ",menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=no"
                );

                if (!popup) return;

                // Lấy CSS inline từ current page
                var cssText = "";
                try {
                    var sheets = document.styleSheets;
                    for (var i = 0; i < sheets.length; i++) {
                        try {
                            var rules = sheets[i].cssRules || sheets[i].rules;
                            if (rules) {
                                for (var j = 0; j < rules.length; j++) {
                                    cssText += rules[j].cssText + "\n";
                                }
                            }
                        } catch (e) {}
                    }
                } catch (e) {}

                // URL params hiện tại (item, mode, file, ...)
                var params = location.search;
                var cssInline = cssText.replace(/body\s*\{[^}]*display[^}]*flex[^}]*\}/, "");

                var html = '<!DOCTYPE html>\n' +
                    '<html lang="vi">\n' +
                    '<head>\n' +
                    '<meta charset="UTF-8">\n' +
                    '<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">\n' +
                    '<title>' + document.title + '</title>\n' +
                    '<style>\n' + cssInline + '\n</style>\n' +
                    '</head>\n' +
                    '<body>\n' +
                    '<div id="app-container"><div id="schools-resource-container"></div></div>\n' +
                    '<div class="bottom-bar">\n' +
                    '<button class="fs-btn" id="exitBtn" title="Thoát">\n' +
                    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">\n' +
                    '<path d="M18 6L6 18M6 6l12 12"/>\n' +
                    '</svg>\n' +
                    '<span>Exit Fullscreen</span>\n' +
                    '</button>\n' +
                    '</div>\n' +
                    '<script>\n' +
                    '(function(){\n' +
                    'var doc=document;\n' +
                    'var el=doc.documentElement;\n' +
                    'function req(){if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();else if(el.mozRequestFullScreen)el.mozRequestFullScreen();else if(el.msRequestFullscreen)el.msRequestFullscreen();}\n' +
                    'doc.getElementById("exitBtn").addEventListener("click",function(){window.close();});\n' +
                    'req();\n' +
                    '})();\n' +
                    '</' + 'script>\n' +
                    '<script src="main.js?v=13"></' + 'script>\n' +
                    '</body>\n' +
                    '</html>';

                popup.document.open();
                popup.document.write(html);
                popup.document.close();
            });
        })();
    </script>

    <script src="main.js?v=13"></script>
</body>
</html>
