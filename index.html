<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schools resource</title>
    <link rel="stylesheet" href="stylist.css?v=2">
</head>
<body>
    <div id="app-container">
        <div id="schools-resource-container"></div>
    </div>

    <div class="bottom-bar">
        <button class="fs-btn" id="fsBtn" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
            <span>Fullscreen</span>
        </button>
    </div>

    <script>
        (function () {
            var fsBtn = document.getElementById("fsBtn");

            function getFsEl() {
                return (
                    document.fullscreenElement ||
                    document.mozFullScreenElement ||
                    document.webkitFullscreenElement ||
                    document.msFullscreenElement ||
                    null
                );
            }

            function requestFs(el) {
                var fns = [
                    "requestFullscreen",
                    "webkitRequestFullscreen",
                    "mozRequestFullScreen",
                    "msRequestFullscreen"
                ];
                for (var i = 0; i < fns.length; i++) {
                    if (typeof el[fns[i]] === "function") {
                        el[fns[i]]();
                        return true;
                    }
                }
                return false;
            }

            function exitFs() {
                var fns = [
                    "exitFullscreen",
                    "webkitExitFullscreen",
                    "mozCancelFullScreen",
                    "msExitFullscreen"
                ];
                for (var i = 0; i < fns.length; i++) {
                    if (typeof document[fns[i]] === "function") {
                        document[fns[i]]();
                        return true;
                    }
                }
                return false;
            }

            function toggleFullscreen() {
                var el = getFsEl();
                if (el) {
                    exitFs();
                } else {
                    // Ưu tiên #app-container → document.documentElement → document.body
                    var targets = [
                        document.getElementById("app-container"),
                        document.documentElement,
                        document.body
                    ];
                    var worked = false;
                    for (var i = 0; i < targets.length; i++) {
                        if (targets[i] && requestFs(targets[i])) {
                            worked = true;
                            break;
                        }
                    }
                    if (!worked) {
                        // Fallback cuối: mở cửa sổ mới chiếm gần hết màn hình
                        var w = screen.availWidth - 40;
                        var h = screen.availHeight - 80;
                        var left = 20;
                        var top = 20;
                        window.open(
                            location.href,
                            "_blank",
                            "width=" + w + ",height=" + h + ",left=" + left + ",top=" + top +
                            ",menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=no"
                        );
                    }
                }
            }

            function updateBtnState() {
                var btnSpan = document.querySelector("#fsBtn span");
                if (btnSpan) {
                    btnSpan.textContent = getFsEl() ? "Exit Fullscreen" : "Fullscreen";
                }
            }

            fsBtn.addEventListener("click", toggleFullscreen);
            var fsEvents = [
                "fullscreenchange",
                "webkitfullscreenchange",
                "mozfullscreenchange",
                "MSFullscreenChange"
            ];
            for (var i = 0; i < fsEvents.length; i++) {
                document.addEventListener(fsEvents[i], updateBtnState);
            }
        })();
    </script>

    <script src="main.js?v=13"></script>
</body>
</html>
